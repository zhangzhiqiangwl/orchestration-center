tls.version=TLSv1.3,TLSv1.2
tls.cipher=TLS_AES_256_GCM_SHA384,TLS_AES_128_GCM_SHA256,TLS_ECDHE_ECDSA_WITH_AES_256_GCM_SHA384,TLS_ECDHE_ECDSA_WITH_AES_128_GCM_SHA256,TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384,TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256,TLS_DHE_RSA_WITH_AES_256_GCM_SHA384,TLS_DHE_DSS_WITH_AES_256_GCM_SHA384,TLS_DHE_RSA_WITH_AES_128_GCM_SHA256,TLS_DHE_DSS_WITH_AES_128_GCM_SHA256
connection.max=500
connection.timeout=300
flowcontrol.ratelimit.parse_pdf=50
flowcontrol.parallelism.parse_pdf=50
flowcontrol.ratelimit.plan=50
flowcontrol.parallelism.plan=50
flowcontrol.ratelimit.all_psops=50
flowcontrol.parallelism.all_psops=50
flowcontrol.ratelimit.one_psop=50
flowcontrol.parallelism.one_psop=50
flowcontrol.ratelimit.save_psop=50
flowcontrol.parallelism.save_psop=50
flowcontrol.ratelimit.delete_psop=50
flowcontrol.parallelism.delete_psop=50
flowcontrol.ratelimit.agent_cards=50
flowcontrol.parallelism.agent_cards=50
flowcontrol.ratelimit.generate_psop=50
flowcontrol.parallelism.generate_psop=50
flowcontrol.ratelimit.retrieve_psop=50
flowcontrol.parallelism.retrieve_psop=50
flowcontrol.ratelimit.start_process_stream=50
flowcontrol.parallelism.start_process_stream=50
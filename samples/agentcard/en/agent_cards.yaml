agents:
  - name: "RAN Energy Saving Agent"
    description: "Responsible for autonomous closed-loop RAN energy efficiency optimization, including intent exploration, intent fulfillment, effect evaluation and reporting."
    provider:
      organization: "Huawei"
      url: ""
    version: "0.1.0"
    iconUrl: ""
    skills:
      - id: "ran-es-intent-exploration"
        name: "RAN ES Intent Exploration"
        description: "Evaluate and determine the best possible values for specified RAN ES intent targets, considering current resource conditions and system capabilities."
        tags: [ "wireless","energy-saving","intent" ]
      - id: "ran-es-intent-lifecycle-management"
        name: "RAN ES Intent Lifecycle Management"
        description: "Manage the lifecycle of RAN energy-saving intents including creation, modification, deletion, activation, deactivation, and perform data collection, analysis, solution formulation and configuration."
        tags: [ "wireless","energy-saving","intent" ]
      - id: "ran-es-intent-reporting"
        name: "RAN ES Intent Reporting"
        description: "Provide intent report query, subscription, and notification capabilities, reporting intent fulfillment status, achieved values, recommended values, and configuration changes."
        tags: [ "wireless","energy-saving","reporting" ]
    capabilities:
      pushNotifications: false
      streaming: false
    defaultInputModes: [ "text" ]
    defaultOutputModes: [ "text" ]
    supportedInterfaces:
      - protocolBinding: "HTTP+JSON"
        protocolVersion: "1.0"
        url: "http://127.0.0.1:8899"

  - name: "Energy Saving Intent Agent"
    description: "Responsible for setting energy-saving intents, interacting with RAN energy efficiency optimization agents, performing intent pre-assessment, intent generation and delivery, and evaluating and adjusting energy-saving effects."
    provider:
      organization: "Huawei"
      url: ""
    version: "0.1.0"
    iconUrl: ""
    skills:
      - id: "intent-exploration-request"
        name: "Intent Exploration Request"
        description: "Initiate RAN ES intent exploration request and obtain the best possible values for specified intent targets."
        tags: [ "wireless","energy-saving","intent" ]
      - id: "intent-generation"
        name: "Intent Generation"
        description: "Generate RAN energy-saving intent content based on exploration reports and business requirements, including throughput and energy-saving targets for different time periods and RATs."
        tags: [ "wireless","energy-saving","intent" ]
      - id: "intent-delivery"
        name: "Intent Delivery"
        description: "Deliver generated energy-saving intents to RAN energy efficiency optimization agents and manage intent lifecycle (invoke intent lifecycle management interfaces)."
        tags: [ "wireless","energy-saving","intent" ]
      - id: "effect-evaluation"
        name: "Effect Evaluation"
        description: "Evaluate energy-saving effects across different RAN domains and adjust intents based on results."
        tags: [ "wireless","energy-saving","evaluation" ]
    capabilities:
      pushNotifications: false
      streaming: false
    defaultInputModes: [ "text" ]
    defaultOutputModes: [ "text" ]
    supportedInterfaces:
      - protocolBinding: "HTTP+JSON"
        protocolVersion: "1.0"
        url: "http://127.0.0.1:8900"

